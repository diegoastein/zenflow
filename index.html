<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFlow - Ruido Blanco & Enfoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PASO 1: Script de AdSense (Colocar aquí cuando tengas la cuenta) -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXX" crossorigin="anonymous"></script> -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1c2c 0%, #0d0e14 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        input[type=range] {
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #818cf8;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
        }

        .ad-slot {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 10px;
        }

        .active-glow {
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.2);
            border-color: rgba(129, 140, 248, 0.4) !important;
        }
        
        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #818cf8;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 30px;
            display: none;
            border: 1px solid rgba(129, 140, 248, 0.3);
            z-index: 100;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8" onclick="unlockAudio()">

    <!-- Header -->
    <header class="text-center mb-12 mt-8">
        <h1 class="text-4xl font-semibold tracking-tight text-indigo-300">ZenFlow</h1>
        <p class="text-slate-400 mt-2">Tu espacio de calma y productividad</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- White Noise -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center" id="card-white">
            <div class="text-4xl mb-4">☁️</div>
            <h3 class="font-medium mb-4 text-slate-200">Ruido Blanco</h3>
            <input type="range" min="0" max="1" step="0.01" value="0" 
                   class="w-full mb-2" oninput="updateVolume('white', this.value)">
            <div class="text-xs text-slate-500 uppercase tracking-widest mt-2" id="val-white">Apagado</div>
        </div>

        <!-- Brown Noise -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center" id="card-brown">
            <div class="text-4xl mb-4">🌊</div>
            <h3 class="font-medium mb-4 text-slate-200">Ruido Marrón</h3>
            <input type="range" min="0" max="1" step="0.01" value="0" 
                   class="w-full mb-2" oninput="updateVolume('brown', this.value)">
            <div class="text-xs text-slate-500 uppercase tracking-widest mt-2" id="val-brown">Apagado</div>
        </div>

        <!-- Rain (Archivo Local) -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center" id="card-rain">
            <div class="text-4xl mb-4">🌧️</div>
            <h3 class="font-medium mb-4 text-slate-200">Lluvia Real</h3>
            <input type="range" min="0" max="1" step="0.01" value="0" 
                   class="w-full mb-2" oninput="updateVolume('rain', this.value)">
            <div class="text-xs text-slate-500 uppercase tracking-widest mt-2" id="val-rain">Apagado</div>
        </div>

        <!-- Forest (Archivo Local) -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center" id="card-forest">
            <div class="text-4xl mb-4">🌳</div>
            <h3 class="font-medium mb-4 text-slate-200">Bosque</h3>
            <input type="range" min="0" max="1" step="0.01" value="0" 
                   class="w-full mb-2" oninput="updateVolume('forest', this.value)">
            <div class="text-xs text-slate-500 uppercase tracking-widest mt-2" id="val-forest">Apagado</div>
        </div>

        <!-- Timer -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center justify-between">
            <h3 class="font-medium text-slate-200 mb-4">Temporizador</h3>
            <div class="flex gap-2">
                <button onclick="setTimer(25)" class="px-3 py-1 bg-slate-800 rounded-lg text-xs hover:bg-slate-700">25m</button>
                <button onclick="setTimer(50)" class="px-3 py-1 bg-slate-800 rounded-lg text-xs hover:bg-slate-700">50m</button>
                <button onclick="stopAll()" class="px-3 py-1 bg-red-900/30 text-red-400 rounded-lg text-xs hover:bg-red-900/50">Stop</button>
            </div>
            <div id="timer-display" class="mt-4 text-2xl font-mono text-indigo-400">00:00</div>
        </div>

        <!-- Espacio para Anuncio Nativo -->
        <div class="glass-card p-6 rounded-3xl flex flex-col items-center justify-center border-dashed">
            <div class="ad-slot w-full h-full rounded-2xl">
                <!-- Espacio para código AdSense -->
                Publicidad
            </div>
        </div>

    </main>

    <div id="status-bar"></div>

    <!-- Banner Inferior -->
    <footer class="mt-16 w-full max-w-2xl px-4">
        <div class="ad-slot w-full py-4 rounded-xl">
            <!-- Espacio para código AdSense Banner -->
            Publicidad (Banner)
        </div>
        <p class="text-center text-slate-600 text-[10px] mt-4 uppercase tracking-tighter">
            ZenFlow es posible gracias a la publicidad no invasiva
        </p>
    </footer>

    <script>
        let audioCtx;
        const gainNodes = {};
        const noiseSources = {};
        const atmosphereAudios = {};
        let timerInterval;
        let isUnlocked = false;

        // Archivos locales (deben estar en la misma carpeta que este HTML)
        const AUDIO_ASSETS = {
            rain: './rain.mp3',
            forest: './forest.mp3'
        };

        function showStatus(msg) {
            const bar = document.getElementById('status-bar');
            bar.innerText = msg;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display = 'none', 3000);
        }

        async function unlockAudio() {
            if (isUnlocked) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            isUnlocked = true;
        }

        // Generador para White y Brown Noise
        function setupNoiseNode(type) {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let lastOut = 0.0;

            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                if (type === 'white') {
                    output[i] = white;
                } else {
                    output[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = output[i];
                    output[i] *= 3.5; 
                }
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;
            gainNode.connect(audioCtx.destination);
            
            source.connect(gainNode);
            source.start();
            return gainNode;
        }

        async function updateVolume(type, value) {
            const val = parseFloat(value);
            await unlockAudio();

            if (type === 'white' || type === 'brown') {
                if (!gainNodes[type]) {
                    gainNodes[type] = setupNoiseNode(type);
                }
                gainNodes[type].gain.setTargetAtTime(val, audioCtx.currentTime, 0.1);
            } else {
                // Motor para Lluvia y Bosque (archivos MP3 locales)
                if (!atmosphereAudios[type]) {
                    const audio = new Audio(AUDIO_ASSETS[type]);
                    audio.loop = true;
                    atmosphereAudios[type] = audio;
                }
                
                atmosphereAudios[type].volume = val;
                if (val > 0) {
                    atmosphereAudios[type].play().catch(() => showStatus("Interactúa con la página"));
                } else {
                    atmosphereAudios[type].pause();
                }
            }

            // Actualización visual de la tarjeta
            const card = document.getElementById(`card-${type}`);
            const label = document.getElementById(`val-${type}`);
            if (val > 0) {
                card.classList.add('active-glow');
                label.innerText = Math.round(val * 100) + "%";
            } else {
                card.classList.remove('active-glow');
                label.innerText = "Apagado";
            }
        }

        function setTimer(minutes) {
            clearInterval(timerInterval);
            let seconds = minutes * 60;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (seconds-- <= 0) {
                    clearInterval(timerInterval);
                    stopAll();
                    display.innerText = "FIN";
                }
            }, 1000);
        }

        function stopAll() {
            Object.values(gainNodes).forEach(n => n.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5));
            Object.values(atmosphereAudios).forEach(a => { a.pause(); a.volume = 0; });
            document.querySelectorAll('input[type=range]').forEach(i => i.value = 0);
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active-glow'));
            document.querySelectorAll('[id^="val-"]').forEach(v => v.innerText = "Apagado");
            clearInterval(timerInterval);
            document.getElementById('timer-display').innerText = "00:00";
        }
    </script>
</body>
</html>
